<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>투표수 입력</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 로딩 -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>캠프 정보를 불러오는 중...</span>
</div>

<!-- 에러 -->
<div id="error-screen" style="display:none; padding:40px 24px; text-align:center;">
  <p style="font-size:32px">⚠️</p>
  <p id="error-msg" style="margin-top:12px; color:#dc2626; font-weight:600;"></p>
  <a href="index.html" style="display:inline-block; margin-top:16px; color:#004EA2;">← 처음으로</a>
</div>

<!-- 메인 -->
<div id="main" style="display:none;">

  <!-- 헤더 -->
  <header id="camp-header" class="camp-header">
    <div class="label">투표수 입력</div>
    <h1 id="header-district"></h1>
    <span id="header-party" class="party-tag"></span>
  </header>

  <!-- 입력 폼 -->
  <div class="card">
    <div id="form-error" class="msg-error" style="display:none;"></div>
    <div id="form-success" class="msg-success" style="display:none;"></div>

    <div class="form-group">
      <label>본부입력담당자</label>
      <input type="text" id="inp-name" placeholder="홍길동" maxlength="20"
             list="name-datalist" autocomplete="off">
      <datalist id="name-datalist"></datalist>
    </div>

    <div class="form-group">
      <label>전화번호</label>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="tel" id="inp-phone" placeholder="010-0000-0000"
               inputmode="numeric" maxlength="13" style="flex:1;">
        <button type="button" id="phone-edit-btn" onclick="unlockPhone()"
                style="display:none; padding:0 14px; height:48px; border-radius:10px;
                       border:1.5px solid #e0e0e0; background:#fff; color:#555;
                       font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;">
          수정
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>투표 동</label>
      <select id="inp-dong">
        <option value="">-- 동을 선택하세요 --</option>
      </select>
      <div id="unit-display" style="display:none; margin-top:6px; font-size:13px; color:#666; font-weight:600;"></div>
    </div>

    <div class="form-group">
      <label>투표현황보고자</label>
      <input type="text" id="inp-field-worker" placeholder="현장에서 투표현황을 보고한 분 이름"
             maxlength="20" list="fw-datalist" autocomplete="off" lang="ko">
      <datalist id="fw-datalist"></datalist>
    </div>

    <div class="form-group">
      <label>투표 유형</label>
      <div style="display:flex; gap:8px; margin-top:4px;">
        <button type="button" id="btn-type-dang"
                onclick="selectVoteType('당원')"
                style="flex:1; height:48px; border-radius:10px; border:2px solid #004EA2;
                       background:#004EA2; color:#fff; font-size:14px; font-weight:700; cursor:pointer;">
          당원투표
        </button>
        <button type="button" id="btn-type-anshim"
                onclick="selectVoteType('안심번호')"
                style="flex:1; height:48px; border-radius:10px; border:2px solid #e0e0e0;
                       background:#fff; color:#888; font-size:14px; font-weight:700; cursor:pointer;">
          일반(안심번호)
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>투표자수</label>
      <input type="number" id="inp-votes" placeholder="0"
             inputmode="numeric" max="99999">
    </div>

    <button class="btn btn-primary" id="btn-submit" onclick="submitVotes()">
      제 출
    </button>
  </div>

  <!-- 실적 보기 버튼 -->
  <div style="margin: 0 12px 8px; display:flex; gap:8px;">
    <button class="btn btn-primary" onclick="openRanking('reporter')"
            style="background:#dc2626; flex:1;">
      📊 본부입력담당자 실적
    </button>
    <button class="btn btn-primary" onclick="openRanking('fieldworker')"
            style="background:#7c3aed; flex:1;">
      📊 투표현황보고자 실적
    </button>
  </div>

  <!-- 차감 동 선택 모달 -->
  <div id="deduct-modal" style="display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; max-width:340px; width:90%; padding:24px;">
      <h3 style="font-size:15px; font-weight:700; margin-bottom:8px;">어느 동에서 차감할까요?</h3>
      <p style="font-size:13px; color:#888; margin-bottom:16px;">
        차감량: <strong id="deduct-amount" style="color:#dc2626;"></strong>
      </p>
      <select id="deduct-dong-sel" style="width:100%; height:44px; font-size:15px;
        border:1.5px solid #e0e0e0; border-radius:8px; padding:0 12px; margin-bottom:16px;">
      </select>
      <div style="display:flex; gap:8px;">
        <button id="btn-deduct-cancel" class="btn btn-secondary" style="flex:1;">취소</button>
        <button id="btn-deduct-confirm" class="btn btn-primary" style="flex:2;">확인</button>
      </div>
    </div>
  </div>

  <!-- 실적 모달 -->
  <div id="ranking-modal" style="display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); z-index:999; overflow-y:auto; padding:20px 12px;">
    <div style="background:#fff; border-radius:16px; max-width:480px; margin:0 auto;">
      <div style="padding:16px 20px; border-bottom:1px solid #eee;
                  display:flex; justify-content:space-between; align-items:center;">
        <span id="ranking-title" style="font-weight:700; font-size:15px;">📊 담당자별 실적</span>
        <button onclick="closeRanking()"
                style="border:none; background:none; font-size:20px; cursor:pointer; color:#888;">✕</button>
      </div>
      <div id="ranking-list" style="padding:8px 0;"></div>
      <div style="padding:12px 16px; border-top:1px solid #eee;">
        <button class="btn btn-secondary" onclick="closeRanking()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 개표마감 (본선만 표시) -->
  <div class="card" id="closing-card" style="display:none;">
    <h3 style="font-size:14px; font-weight:700; color:#555; margin-bottom:12px;">개표마감</h3>
    <div id="closing-status" style="margin-bottom:12px; font-size:14px;"></div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary" id="btn-closing" onclick="submitClosing()"
              style="background:#dc2626; flex:2;">🏁 개표마감</button>
      <button class="btn btn-secondary" id="btn-cancel-closing" onclick="cancelClosing()"
              style="display:none; flex:1;">마감취소</button>
    </div>
  </div>

  <!-- 제출 이력 -->
  <div class="card" id="history-card" style="display:none;">
    <h3 style="font-size:14px; font-weight:700; color:#555; margin-bottom:12px;">
      내 제출 이력
    </h3>
    <ul class="history-list" id="history-list"></ul>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/address.js"></script>
<script>
  let camp          = null
  let lastVoteCount = null
  let currentClosing = null
  let voteType       = '당원'
  let reporterMap    = {}    // name → fullPhone (DB + localStorage)
  let selectedPhone  = null  // 목록 선택 시 실제 전화번호

  function selectVoteType(type) {
    voteType = type
    const primary = camp?.party === 'people' ? '#C9151E' : '#004EA2'
    const btnDang   = document.getElementById('btn-type-dang')
    const btnAnshim = document.getElementById('btn-type-anshim')
    if (type === '당원') {
      btnDang.style.cssText   = `flex:1; height:48px; border-radius:10px; border:2px solid ${primary}; background:${primary}; color:#fff; font-size:14px; font-weight:700; cursor:pointer;`
      btnAnshim.style.cssText = `flex:1; height:48px; border-radius:10px; border:2px solid #e0e0e0; background:#fff; color:#888; font-size:14px; font-weight:700; cursor:pointer;`
    } else {
      btnAnshim.style.cssText = `flex:1; height:48px; border-radius:10px; border:2px solid ${primary}; background:${primary}; color:#fff; font-size:14px; font-weight:700; cursor:pointer;`
      btnDang.style.cssText   = `flex:1; height:48px; border-radius:10px; border:2px solid #e0e0e0; background:#fff; color:#888; font-size:14px; font-weight:700; cursor:pointer;`
    }
  }

  // ── 초기화 ────────────────────────────────────────
  async function init() {
    const slug = getParam('slug')
    if (!slug) return showError('캠프 주소가 올바르지 않습니다.')

    try {
      const { data, error } = await db.from('camps').select('*').eq('slug', slug).single()
      if (error || !data) return showError('등록된 캠프를 찾을 수 없습니다.')
      if (!data.is_active)  return showError('현재 비활성화된 캠프입니다.')

      camp = data
      renderCamp()
      selectVoteType('당원')   // 정당 색상 적용 후 기본값 세팅
      await loadDongOptions()
      await loadReporterList()  // name-datalist + reporterMap 구성
      restoreInputs()
      loadFieldWorkerNames()
      await loadMyHistory()
      if (camp.election_type === '본선') {
        document.getElementById('closing-card').style.display = 'block'
        await loadClosingStatus()
      }

      document.getElementById('loading').style.display = 'none'
      document.getElementById('main').style.display = 'block'

    } catch (e) {
      showError('오류가 발생했습니다: ' + e.message)
    }
  }

  // ── 캠프 정보 렌더 ───────────────────────────────
  function renderCamp() {
    const body = document.body
    body.classList.add(`party-${camp.party}`)

    document.title = `${camp.district} ${camp.party_name} 투표수 입력`
    document.getElementById('header-district').textContent =
      `${camp.sido} ${camp.district}`
    document.getElementById('header-party').textContent = camp.party_name
  }

  // ── 동 드롭다운 ──────────────────────────────────
  async function loadDongOptions() {
    const dongs = await loadDongs(camp.sigungu)
    const sel   = document.getElementById('inp-dong')
    dongs.forEach(d => {
      const opt = document.createElement('option')
      opt.value = d
      opt.textContent = d
      sel.appendChild(opt)
    })
  }

  // ── 본부입력담당자 목록 (DB + localStorage) ──────
  async function loadReporterList() {
    const { data } = await db
      .from('submissions')
      .select('reporter_name, reporter_phone')
      .eq('camp_id', camp.id)
      .order('submitted_at', { ascending: false })

    reporterMap = {}
    ;(data || []).forEach(row => {
      if (!reporterMap[row.reporter_name])
        reporterMap[row.reporter_name] = row.reporter_phone
    })

    // localStorage 병합 (오프라인 신규 등록자 포함)
    const saved = JSON.parse(localStorage.getItem(`cv_reporters_${camp.slug}`) || '[]')
    saved.forEach(({ name, phone }) => {
      if (!reporterMap[name]) reporterMap[name] = phone
    })

    refreshNameDatalist()
  }

  function refreshNameDatalist() {
    const dl = document.getElementById('name-datalist')
    dl.innerHTML = ''
    Object.keys(reporterMap).forEach(name => {
      const opt = document.createElement('option')
      opt.value = name
      dl.appendChild(opt)
    })
  }

  function maskPhone(phone) {
    const parts = phone.split('-')
    return parts.length === 3 ? `${parts[0]}-****-${parts[2]}` : phone
  }

  function applyReporterSelection(name) {
    const phone   = reporterMap[name]
    const phoneEl = document.getElementById('inp-phone')
    const editBtn = document.getElementById('phone-edit-btn')
    if (phone) {
      selectedPhone        = phone
      phoneEl.value        = maskPhone(phone)
      phoneEl.readOnly     = true
      phoneEl.style.background = '#f5f5f5'
      phoneEl.style.color      = '#888'
      editBtn.style.display    = 'inline-block'
    } else {
      selectedPhone            = null
      phoneEl.readOnly         = false
      phoneEl.style.background = ''
      phoneEl.style.color      = ''
      editBtn.style.display    = 'none'
    }
  }

  function unlockPhone() {
    selectedPhone = null
    const phoneEl = document.getElementById('inp-phone')
    phoneEl.value        = ''
    phoneEl.readOnly     = false
    phoneEl.style.background = ''
    phoneEl.style.color      = ''
    document.getElementById('phone-edit-btn').style.display = 'none'
    phoneEl.focus()
  }

  function saveReporter(name, phone) {
    if (!name || !phone) return
    const key  = `cv_reporters_${camp.slug}`
    const list = JSON.parse(localStorage.getItem(key) || '[]')
    const next = [{ name, phone }, ...list.filter(r => r.name !== name)].slice(0, 20)
    localStorage.setItem(key, JSON.stringify(next))
    if (!reporterMap[name]) {
      reporterMap[name] = phone
      refreshNameDatalist()
    }
  }

  // ── 투표현황보고자 이름 목록 ─────────────────────
  function loadFieldWorkerNames() {
    const saved = JSON.parse(localStorage.getItem(`cv_fw_names_${camp.slug}`) || '[]')
    const dl    = document.getElementById('fw-datalist')
    dl.innerHTML = ''
    saved.forEach(name => {
      const opt = document.createElement('option')
      opt.value = name
      dl.appendChild(opt)
    })
    const input = document.getElementById('inp-field-worker')
    if (saved.length > 0 && !input.value) input.value = saved[0]
  }

  function saveFieldWorkerName(name) {
    if (!name) return
    const key   = `cv_fw_names_${camp.slug}`
    const saved = JSON.parse(localStorage.getItem(key) || '[]')
    const next  = [name, ...saved.filter(n => n !== name)].slice(0, 15)
    localStorage.setItem(key, JSON.stringify(next))
    loadFieldWorkerNames()
  }

  // ── 입력값 복원 (localStorage) ───────────────────
  function restoreInputs() {
    const saved = JSON.parse(localStorage.getItem(`cv_input_${camp.slug}`) || '{}')
    if (saved.name) {
      document.getElementById('inp-name').value = saved.name
      applyReporterSelection(saved.name)
      // reporterMap에 없는 신규 사용자면 저장된 phone 복원
      if (!selectedPhone && saved.phone)
        document.getElementById('inp-phone').value = saved.phone
    }
    if (saved.dong) {
      document.getElementById('inp-dong').value = saved.dong
      loadLastVoteCount(selectedPhone || saved.phone, saved.dong)
    }
  }

  // ── 이전 제출값 로드 ─────────────────────────────
  async function loadLastVoteCount(phone, dong) {
    if (!phone || !dong) return
    const { data } = await db
      .from('submissions')
      .select('vote_count')
      .eq('camp_id', camp.id)
      .eq('reporter_phone', phone)
      .eq('dong', dong)
      .order('submitted_at', { ascending: false })
      .limit(1)
    if (data && data.length > 0) lastVoteCount = data[0].vote_count
  }

  // ── 제출 이력 로드 ───────────────────────────────
  async function loadMyHistory() {
    const phone = document.getElementById('inp-phone').value
    if (!phone || !isValidPhone(phone)) return

    const { data } = await db
      .from('submissions')
      .select('dong, vote_count, vote_type, field_worker_name, submitted_at')
      .eq('camp_id', camp.id)
      .eq('reporter_phone', phone)
      .order('submitted_at', { ascending: false })
      .limit(10)

    if (!data || data.length === 0) return

    const list = document.getElementById('history-list')
    list.innerHTML = ''
    data.forEach(row => {
      const li = document.createElement('li')
      li.className = 'history-item'
      const typeTag = row.vote_type === '안심번호'
        ? `<span style="font-size:10px; background:#e0f2fe; color:#0369a1; border-radius:4px; padding:1px 5px; margin-right:4px;">안심번호</span>`
        : `<span style="font-size:10px; background:#fef3c7; color:#92400e; border-radius:4px; padding:1px 5px; margin-right:4px;">당원</span>`
      const workerLabel = row.field_worker_name
        ? `<span style="font-size:11px; color:#555;"> · ${row.field_worker_name}</span>`
        : ''
      const escapedDong   = row.dong.replace(/'/g, "\\'")
      const escapedWorker = (row.field_worker_name || '').replace(/'/g, "\\'")
      const cancelBtn = row.vote_count > 0
        ? `<button onclick="cancelSubmission(this,'${escapedDong}',${row.vote_count},'${row.vote_type}','${escapedWorker}')"
                   style="font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid #dc2626;
                          background:#fff; color:#dc2626; cursor:pointer; white-space:nowrap; flex-shrink:0;">취소</button>`
        : `<span style="font-size:11px; color:#94a3b8; flex-shrink:0;">보정됨</span>`
      li.innerHTML = `
        <span class="history-time">${formatTime(row.submitted_at)}</span>
        <span>${typeTag}${row.dong}${workerLabel}</span>
        <span style="display:flex; align-items:center; gap:6px;">
          <span class="history-votes">${formatNumber(row.vote_count)}표</span>
          ${cancelBtn}
        </span>
      `
      list.appendChild(li)
    })

    document.getElementById('history-card').style.display = 'block'
  }

  // ── 제출 ─────────────────────────────────────────
  async function submitVotes() {
    hideMsg()

    const name        = document.getElementById('inp-name').value.trim()
    const dong        = document.getElementById('inp-dong').value
    const fieldWorker = document.getElementById('inp-field-worker').value.trim()
    const votesRaw    = document.getElementById('inp-votes').value
    const votes       = parseInt(votesRaw, 10)
    const actualPhone = selectedPhone || document.getElementById('inp-phone').value.trim()

    // 유효성 검사
    if (!name || name.length < 2)
      return showFormError('이름을 2자 이상 입력하세요.')
    if (!isValidPhone(actualPhone))
      return showFormError('전화번호를 확인하세요. (010-XXXX-XXXX)')
    if (!dong)
      return showFormError('담당 동을 선택하세요.')
    if (!fieldWorker)
      return showFormError('투표현황보고자 이름을 입력하세요.')
    if (isNaN(votes) || votes === 0)
      return showFormError('투표자수를 입력하세요.')
    if (votes < 0)
      return showFormError('음수는 입력할 수 없습니다.')

    // 동일 번호 다른 이름 차단 (신규 등록자만 검사)
    const blocked = await checkDuplicatePhone(name, actualPhone)
    if (blocked) return

    await doInsert(name, actualPhone, dong, votes, voteType, fieldWorker)
  }

  // ── 음수 차감 처리 ────────────────────────────────
  async function handleNegativeSubmit(name, phone, dong, votes, fieldWorker) {
    // 해당 동에 본인 제출 이력 확인
    const { data } = await db
      .from('submissions')
      .select('dong')
      .eq('camp_id', camp.id)
      .eq('reporter_phone', phone)
      .eq('dong', dong)
      .limit(1)

    if (data && data.length > 0) {
      // 같은 동 이력 있음 → 음수값 그대로 제출 (합산에서 차감됨)
      await doInsert(name, phone, dong, votes, voteType, fieldWorker)
    } else {
      // 같은 동 이력 없음 → 어느 동에서 차감할지 물어봄
      await openDeductModal(name, phone, votes, fieldWorker)
    }
  }

  // ── 차감 동 선택 모달 ─────────────────────────────
  async function openDeductModal(name, phone, votes, fieldWorker) {
    // 본인이 제출한 동 목록 조회
    const { data } = await db
      .from('submissions')
      .select('dong')
      .eq('camp_id', camp.id)
      .eq('reporter_phone', phone)
      .order('submitted_at', { ascending: false })

    if (!data || data.length === 0) {
      showFormError('제출 이력이 없어 차감할 수 없습니다.')
      return
    }

    const dongs = [...new Set(data.map(r => r.dong))]

    const sel = document.getElementById('deduct-dong-sel')
    sel.innerHTML = '<option value="">동 선택</option>'
    dongs.forEach(d => {
      const o = document.createElement('option')
      o.value = d; o.textContent = d
      sel.appendChild(o)
    })

    document.getElementById('deduct-amount').textContent = `${Math.abs(votes)}표 차감`
    document.getElementById('deduct-modal').style.display = 'flex'

    document.getElementById('btn-deduct-confirm').onclick = async () => {
      const selectedDong = sel.value
      if (!selectedDong) { alert('동을 선택하세요.'); return }
      document.getElementById('deduct-modal').style.display = 'none'
      await doInsert(name, phone, selectedDong, votes, voteType, fieldWorker)
    }

    document.getElementById('btn-deduct-cancel').onclick = () => {
      document.getElementById('deduct-modal').style.display = 'none'
    }
  }

  // ── 실제 INSERT ───────────────────────────────────
  async function doInsert(name, phone, dong, votes, type = '당원', fieldWorker = '') {
    const btn = document.getElementById('btn-submit')
    btn.disabled = true
    btn.textContent = '제출 중...'

    try {
      const ip = await getClientIP()
      const { error } = await db.from('submissions').insert({
        camp_id:           camp.id,
        reporter_name:     name,
        reporter_phone:    phone,
        dong,
        vote_count:        votes,
        vote_type:         type,
        field_worker_name: fieldWorker,
        ip_address:        ip
      })

      if (error) throw error

      saveReporter(name, phone)  // name-datalist + localStorage 갱신
      localStorage.setItem(`cv_input_${camp.slug}`,
        JSON.stringify({ name, phone, dong }))

      lastVoteCount = votes
      const label = votes < 0 ? `${dong} ${formatNumber(votes)}표 차감 완료!` : `${dong} ${formatNumber(votes)}표 제출 완료!`
      showFormSuccess(label)
      saveFieldWorkerName(fieldWorker)   // 이름 목록에 저장 (datalist 갱신)
      document.getElementById('inp-votes').value = ''
      document.getElementById('inp-field-worker').value = ''  // 다음 입력을 위해 초기화
      await loadMyHistory()

    } catch (e) {
      showFormError('제출 실패: ' + (e.message || '다시 시도해주세요.'))
    } finally {
      btn.disabled = false
      btn.textContent = '제 출'
    }
  }

  // ── 전화번호 중복 체크 ────────────────────────────────
  async function checkDuplicatePhone(name, actualPhone) {
    // 목록에서 선택한 기존 등록자 → 이미 검증됨
    if (selectedPhone) return false

    const { data } = await db
      .from('submissions')
      .select('reporter_name')
      .eq('camp_id', camp.id)
      .eq('reporter_phone', actualPhone)
      .limit(1)

    if (data && data.length > 0 && data[0].reporter_name !== name) {
      showFormError(`이 번호는 이미 '${data[0].reporter_name}'으로 등록되어 있습니다.`)
      return true
    }
    return false
  }

  // ── 실적 모달 ─────────────────────────────────────────
  async function openRanking(type) {
    const isFieldWorker = type === 'fieldworker'
    document.getElementById('ranking-title').textContent =
      isFieldWorker ? '📊 투표현황보고자 실적' : '📊 본부입력담당자 실적'
    document.getElementById('ranking-modal').style.display = 'block'
    document.getElementById('ranking-list').innerHTML =
      '<div style="text-align:center; padding:24px; color:#888;">불러오는 중...</div>'

    const myPhone      = selectedPhone || document.getElementById('inp-phone').value.trim()
    const myFwName     = document.getElementById('inp-field-worker').value.trim()

    const { data } = await db
      .from('submissions')
      .select('reporter_name, reporter_phone, field_worker_name, dong, vote_count, vote_type, submitted_at')
      .eq('camp_id', camp.id)
      .order('submitted_at', { ascending: false })

    if (!data || data.length === 0) {
      document.getElementById('ranking-list').innerHTML =
        '<div style="text-align:center; padding:24px; color:#888;">아직 제출 데이터가 없습니다.</div>'
      return
    }

    // 집계
    const map = {}
    data.forEach(row => {
      const key = isFieldWorker
        ? (row.field_worker_name || '(미입력)')
        : row.reporter_phone
      if (!map[key]) {
        map[key] = {
          name:   isFieldWorker ? (row.field_worker_name || '(미입력)') : row.reporter_name,
          id:     key,
          dong:   row.dong, votes: 0, dangVotes: 0, anshimVotes: 0, time: row.submitted_at
        }
      }
      map[key].votes += row.vote_count
      if (row.vote_type === '안심번호') map[key].anshimVotes += row.vote_count
      else                              map[key].dangVotes   += row.vote_count
      if (row.submitted_at > map[key].time) {
        map[key].time = row.submitted_at
        map[key].dong = row.dong
      }
    })

    let sorted = Object.values(map).sort((a, b) => b.votes - a.votes)
    const limit = camp.reporter_limit || 0
    if (limit > 0) sorted = sorted.slice(0, limit)

    const list = document.getElementById('ranking-list')
    list.innerHTML = ''

    if (limit > 0) {
      const info = document.createElement('div')
      info.style.cssText = 'text-align:center; padding:8px 20px 0; font-size:12px; color:#888;'
      info.textContent = `상위 ${limit}명만 표시됩니다.`
      list.appendChild(info)
    }

    sorted.forEach((r, i) => {
      const isMe  = isFieldWorker ? r.name === myFwName : r.id === myPhone
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`
      const primary = camp?.party === 'people' ? '#C9151E' : '#004EA2'
      const sub = isFieldWorker
        ? `<span style="font-size:10px; background:#fef3c7; color:#92400e; border-radius:3px; padding:1px 5px; margin-right:3px;">당원 ${formatNumber(r.dangVotes)}</span>` +
          `<span style="font-size:10px; background:#e0f2fe; color:#0369a1; border-radius:3px; padding:1px 5px;">안심 ${formatNumber(r.anshimVotes)}</span>`
        : `${r.dong} · ${formatTime(r.time)}`
      const div = document.createElement('div')
      div.style.cssText = `padding:12px 20px; display:flex; align-items:center; gap:12px;
        border-bottom:1px solid #f0f0f0; background:${isMe ? '#E3F0FF' : '#fff'};`
      div.innerHTML = `
        <span style="font-size:18px; min-width:28px;">${medal}</span>
        <div style="flex:1;">
          <div style="font-weight:${isMe ? '700' : '600'}; font-size:14px;">
            ${r.name}${isMe ? ` <span style="color:${primary}; font-size:11px;">(나)</span>` : ''}
          </div>
          <div style="font-size:12px; color:#888; margin-top:2px;">${sub}</div>
        </div>
        <span style="font-size:17px; font-weight:700; color:${isMe ? primary : '#222'};">
          ${formatNumber(r.votes)}표
        </span>
      `
      list.appendChild(div)
    })
  }

  // ── 제출 취소 (음수 보정) ────────────────────────────
  async function cancelSubmission(btn, dong, voteCount, voteType, fieldWorker) {
    if (!confirm(`[${dong}] ${formatNumber(voteCount)}표를 취소하시겠습니까?\n(-${formatNumber(voteCount)}표 보정이 제출됩니다.)`)) return

    const name        = document.getElementById('inp-name').value.trim()
    const actualPhone = selectedPhone || document.getElementById('inp-phone').value.trim()

    if (!name || !isValidPhone(actualPhone)) {
      showFormError('이름과 전화번호를 먼저 입력하세요.')
      return
    }

    btn.disabled    = true
    btn.textContent = '처리중...'

    await doInsert(name, actualPhone, dong, -voteCount, voteType, fieldWorker)
  }

  function closeRanking() {
    document.getElementById('ranking-modal').style.display = 'none'
  }

  // ── 개표마감 ─────────────────────────────────────────
  async function loadClosingStatus() {
    const phone = document.getElementById('inp-phone').value
    const dong  = document.getElementById('inp-dong').value
    if (!phone || !dong) return

    const { data } = await db
      .from('closings')
      .select('*')
      .eq('camp_id', camp.id)
      .eq('dong', dong)
      .eq('reporter_phone', phone)
      .eq('cancelled', false)
      .order('closed_at', { ascending: false })
      .limit(1)

    currentClosing = data?.[0] || null
    renderClosingStatus()
  }

  function renderClosingStatus() {
    const statusEl     = document.getElementById('closing-status')
    const btnClose     = document.getElementById('btn-closing')
    const btnCancel    = document.getElementById('btn-cancel-closing')

    if (currentClosing) {
      statusEl.innerHTML =
        `<span style="color:#16a34a; font-weight:700;">✅ 개표마감 완료</span>` +
        `<span style="color:#888; font-size:12px; margin-left:8px;">${formatTime(currentClosing.closed_at)}</span>`
      btnClose.style.display  = 'none'
      btnCancel.style.display = 'block'
    } else {
      statusEl.innerHTML = `<span style="color:#555;">아직 개표가 진행 중입니다.</span>`
      btnClose.style.display  = 'block'
      btnCancel.style.display = 'none'
    }
  }

  async function submitClosing() {
    const name  = document.getElementById('inp-name').value.trim()
    const phone = selectedPhone || document.getElementById('inp-phone').value.trim()
    const dong  = document.getElementById('inp-dong').value

    if (!name || !isValidPhone(phone) || !dong) {
      alert('이름, 전화번호, 담당 동을 먼저 입력하세요.')
      return
    }
    if (!confirm(`[${dong}] 개표마감을 제출하시겠습니까?`)) return

    const { data, error } = await db
      .from('closings')
      .insert({
        camp_id: camp.id,
        dong,
        reporter_name:  name,
        reporter_phone: phone
      })
      .select().single()

    if (!error) {
      currentClosing = data
      renderClosingStatus()
      showToast('개표마감이 제출됐습니다.')
    } else {
      alert('오류: ' + error.message)
    }
  }

  async function cancelClosing() {
    if (!currentClosing) return
    if (!confirm('개표마감을 취소하시겠습니까?')) return

    const { error } = await db
      .from('closings')
      .update({ cancelled: true })
      .eq('id', currentClosing.id)

    if (!error) {
      currentClosing = null
      renderClosingStatus()
      showToast('개표마감이 취소됐습니다.')
    } else {
      alert('오류: ' + error.message)
    }
  }

  // ── 전화번호 자동 하이픈 ──────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // 이름 변경 시 전화번호 자동 처리
    const nameEl = document.getElementById('inp-name')
    nameEl.addEventListener('change', () => {
      applyReporterSelection(nameEl.value.trim())
    })

    const phoneEl = document.getElementById('inp-phone')
    phoneEl.addEventListener('input', e => {
      if (!phoneEl.readOnly) e.target.value = formatPhone(e.target.value)
    })
    phoneEl.addEventListener('blur', async () => {
      const actualPhone = selectedPhone || phoneEl.value.trim()
      const name = document.getElementById('inp-name').value.trim()
      await checkDuplicatePhone(name, actualPhone)
      await loadMyHistory()
    })

    const dongEl = document.getElementById('inp-dong')
    dongEl.addEventListener('change', async () => {
      const dong = dongEl.value
      const actualPhone = selectedPhone || document.getElementById('inp-phone').value
      loadLastVoteCount(actualPhone, dong)

      const unitEl = document.getElementById('unit-display')
      if (dong) {
        const unit = await getUnitByDong(camp.sigungu, dong)
        if (unit) {
          unitEl.textContent = `→ ${camp.sigungu}${unit} 선거구`
          unitEl.style.display = 'block'
        } else {
          unitEl.style.display = 'none'
        }
      } else {
        unitEl.style.display = 'none'
      }
    })

    init()
  })

  // ── UI 헬퍼 ──────────────────────────────────────
  function showError(msg) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error-screen').style.display = 'block'
    document.getElementById('error-msg').textContent = msg
  }
  function showFormError(msg) {
    const el = document.getElementById('form-error')
    el.textContent = msg
    el.style.display = 'block'
  }
  function showFormSuccess(msg) {
    const el = document.getElementById('form-success')
    el.textContent = msg
    el.style.display = 'block'
  }
  function hideMsg() {
    document.getElementById('form-error').style.display   = 'none'
    document.getElementById('form-success').style.display = 'none'
  }
</script>
</body>
</html>
