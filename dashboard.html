<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>본부 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── 정당 색 ───────────────────────────────────── */
    body.party-minjoo { --party-primary: #004EA2; --party-light: #1d4ed8; }
    body.party-people { --party-primary: #C9151E; --party-light: #dc2626; }

    /* ── 헤더 ─────────────────────────────────────── */
    .dash-header {
      background: var(--party-primary, #1e293b);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; }
    .header-party { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 2px; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 5px 13px; font-size: 12px; color: #fff; font-weight: 600;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
      animation: blink 1.3s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .refresh-btn {
      padding: 7px 16px; border-radius: 8px;
      background: rgba(255,255,255,0.15); color: #fff;
      border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.28); }

    /* ── 요약 바 ──────────────────────────────────── */
    .summary-bar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .sum-item { padding: 0 28px; text-align: center; }
    .sum-item:first-child { padding-left: 0; }
    .sum-val { font-size: 24px; font-weight: 700; color: #fff; }
    .sum-val.green { color: #4ade80; }
    .sum-val.red   { color: #f87171; }
    .sum-lbl { font-size: 11px; color: #64748b; margin-top: 3px; }
    .sum-divider { width: 1px; background: #334155; height: 40px; flex-shrink: 0; }
    .sum-time { margin-left: auto; font-size: 12px; color: #475569; }

    /* ── 단위 그리드 ───────────────────────────────── */
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px;
    }
    .unit-grid.cols-1 { grid-template-columns: 1fr; }
    .unit-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

    /* ── 단위 카드 ─────────────────────────────────── */
    .unit-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .unit-card-header {
      padding: 12px 18px;
      background: #273548;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }
    .unit-name { font-size: 17px; font-weight: 700; color: #fff; }
    .unit-meta { text-align: right; }
    .unit-total { font-size: 20px; font-weight: 700; color: #fff; }
    .unit-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* ── 차트 ─────────────────────────────────────── */
    .unit-chart-wrap {
      padding: 12px 16px 8px;
      border-bottom: 1px solid #334155;
    }

    /* ── 동 테이블 ─────────────────────────────────── */
    .dong-table { width: 100%; border-collapse: collapse; }
    .dong-table th {
      font-size: 11px; color: #64748b; font-weight: 600;
      padding: 8px 18px; text-align: left;
      background: #0f172a; border-bottom: 1px solid #334155;
    }
    .dong-table td {
      padding: 7px 18px; font-size: 13px; color: #cbd5e1;
      border-bottom: 1px solid #1e293b;
    }
    .dong-table tr:last-child td { border-bottom: none; }
    .dong-table .votes { font-weight: 700; color: #fff; }
    .dong-table .time  { color: #64748b; font-size: 12px; }
    .dong-table tr.unreported td { color: #64748b; }
    .dong-table tr.unreported .dong-name::before {
      content: '● ';
      color: #ef4444;
      font-size: 8px;
    }
    .dong-table tr.unreported .votes { color: #ef4444; font-weight: 400; }

    /* ── 탭 ──────────────────────────────────────── */
    .tab-bar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      padding: 0 28px;
      gap: 4px;
    }
    .tab-btn {
      padding: 11px 20px;
      font-size: 13px; font-weight: 600;
      color: #64748b; background: none; border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer; transition: all 0.15s;
    }
    .tab-btn:hover { color: #cbd5e1; }
    .tab-btn.active {
      color: #fff;
      border-bottom-color: var(--party-primary, #3b82f6);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── 담당자 통계 ───────────────────────────────── */
    .reporter-wrap { padding: 14px; }
    .sort-bar { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .sort-lbl { color:#94a3b8; font-size:13px; }
    .sort-btn {
      padding: 5px 14px; border-radius:6px; font-size:12px; font-weight:600;
      border: 1px solid #334155; background:#1e293b; color:#94a3b8; cursor:pointer;
    }
    .sort-btn.active { background: var(--party-primary,#3b82f6); color:#fff; border-color:transparent; }
    .limit-sel {
      margin-left: auto;
      background: #1e293b; color: #94a3b8;
      border: 1px solid #334155; border-radius: 6px;
      padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .chart-card {
      background:#1e293b; border:1px solid #334155;
      border-radius:12px; padding:16px; margin-bottom:12px;
    }
    .reporter-table { width: 100%; border-collapse: collapse;
      background: #1e293b; border-radius: 12px; overflow: hidden;
      border: 1px solid #334155; }
    .reporter-table th {
      font-size: 11px; color: #64748b; font-weight: 600;
      padding: 10px 18px; text-align: left;
      background: #0f172a; border-bottom: 1px solid #334155;
    }
    .reporter-table td {
      padding: 10px 18px; font-size: 13px; color: #cbd5e1;
      border-bottom: 1px solid #1a2744; vertical-align: middle;
    }
    .reporter-table tr:last-child td { border-bottom: none; }
    .reporter-table tr:hover td { background: #243047; }
    .reporter-table .r-name  { font-weight: 700; color: #fff; }
    .reporter-table .r-votes { font-weight: 700; color: #4ade80; font-size: 15px; }
    .reporter-table .r-time  { color: #64748b; font-size: 12px; }
    .reporter-table .r-cnt   { color: #94a3b8; }
    .unit-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
      background: #273548; color: #93c5fd;
      margin-right: 4px;
    }
    .call-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 6px;
      background: #1d4ed8; color: #fff;
      border: none; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: background 0.15s;
    }
    .call-btn:hover { background: #2563eb; }

    /* ── 전화 모달 ─────────────────────────────────── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 32px 40px;
      text-align: center; min-width: 280px;
    }
    .modal-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .modal-phone {
      font-size: 28px; font-weight: 700; color: #4ade80;
      letter-spacing: 2px; margin-bottom: 24px;
    }
    .modal-close {
      padding: 8px 24px; border-radius: 8px;
      background: #334155; color: #cbd5e1;
      border: none; cursor: pointer; font-size: 14px;
    }
    .modal-close:hover { background: #475569; }
    .dong-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .dong-tag {
      padding: 2px 7px; border-radius: 4px;
      background: #334155; color: #cbd5e1; font-size: 11px;
    }

    /* ── 로딩 ─────────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; gap: 12px; color: #94a3b8; font-size: 15px;
    }
    .spinner {
      width: 24px; height: 24px; border: 3px solid #334155;
      border-top-color: #60a5fa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 ───────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: #1e293b; color: #e2e8f0;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      border: 1px solid #334155;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0; transform: translateY(8px);
      transition: all 0.25s; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>대시보드를 불러오는 중...</span>
</div>

<div id="error-screen" style="display:none; padding:60px; text-align:center;">
  <p style="font-size:40px">⚠️</p>
  <p id="error-msg" style="margin-top:16px; color:#ef4444; font-size:16px; font-weight:600;"></p>
</div>

<div id="main" style="display:none;">

  <!-- 헤더 -->
  <header class="dash-header">
    <div class="header-left">
      <div>
        <div class="header-title" id="header-district"></div>
        <div class="header-party"  id="header-party"></div>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span> 실시간 연결
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="refresh-btn" id="btn-export" onclick="exportExcel()">📥 엑셀</button>
      <button class="refresh-btn" onclick="refreshDashboard()">🔄 새로고침</button>
    </div>
  </header>

  <!-- 요약 바 -->
  <div class="summary-bar">
    <div class="sum-item">
      <div class="sum-val" id="sum-total">-</div>
      <div class="sum-lbl">총 투표수</div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-item">
      <div class="sum-val green" id="sum-rate">-</div>
      <div class="sum-lbl">목표 달성률</div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-item">
      <div class="sum-val" id="sum-reported">-</div>
      <div class="sum-lbl">보고 완료</div>
    </div>
    <div class="sum-divider"></div>
    <div class="sum-item">
      <div class="sum-val red" id="sum-unreported">-</div>
      <div class="sum-lbl">미보고</div>
    </div>
    <div class="sum-time" id="last-update"></div>
  </div>

  <!-- 전체 마감 배너 -->
  <div id="all-closed-banner" style="display:none;
    background:#16a34a; color:#fff; text-align:center;
    padding:16px; font-size:18px; font-weight:700; letter-spacing:1px;">
    🏁 전체 개표 마감 완료
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('realtime')">실시간 현황</button>
    <button class="tab-btn"        onclick="switchTab('reporter')">담당자별 통계</button>
    <button class="tab-btn"        onclick="switchTab('fieldworker')">투표현황보고자 통계</button>
  </div>

  <!-- 탭 1: 실시간 현황 -->
  <div class="tab-pane active" id="pane-realtime">
    <div class="unit-grid" id="unit-grid"></div>
  </div>

  <!-- 전화 모달 -->
  <div class="modal-bg" id="call-modal" onclick="closeCallModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-phone" id="modal-phone"></div>
      <button class="modal-close" onclick="closeCallModal()">닫기</button>
    </div>
  </div>

  <!-- 탭 2: 담당자별 통계 -->
  <div class="tab-pane" id="pane-reporter">
    <div class="reporter-wrap">
      <div class="sort-bar">
        <span class="sort-lbl">정렬:</span>
        <button class="sort-btn active" id="sort-desc" onclick="setReporterSort('desc')">높은순 ↓</button>
        <button class="sort-btn"        id="sort-asc"  onclick="setReporterSort('asc')">낮은순 ↑</button>
        <span class="sort-lbl" style="margin-left:auto;">현장 순위 표시:</span>
        <select id="limit-sel" class="limit-sel" onchange="setReporterLimit(this.value)">
          <option value="0">전체</option>
          <option value="1">1명</option>
          <option value="2">2명</option>
          <option value="3">3명</option>
          <option value="4">4명</option>
          <option value="5">5명</option>
          <option value="6">6명</option>
          <option value="7">7명</option>
          <option value="8">8명</option>
          <option value="9">9명</option>
          <option value="10">10명</option>
        </select>
      </div>
      <table class="reporter-table">
        <thead>
          <tr>
            <th>이름</th>
            <th>단위</th>
            <th>담당 동</th>
            <th style="color:#fbbf24;">당원</th>
            <th style="color:#34d399;">안심번호</th>
            <th>합계</th>
            <th>제출 횟수</th>
            <th>마지막 보고</th>
            <th>전화</th>
          </tr>
        </thead>
        <tbody id="reporter-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 탭 3: 투표현황보고자 통계 -->
  <div class="tab-pane" id="pane-fieldworker">
    <div class="reporter-wrap">
      <div class="sort-bar">
        <span class="sort-lbl">정렬:</span>
        <button class="sort-btn active" id="fw-sort-desc" onclick="setFieldWorkerSort('desc')">높은순 ↓</button>
        <button class="sort-btn"        id="fw-sort-asc"  onclick="setFieldWorkerSort('asc')">낮은순 ↑</button>
      </div>
      <table class="reporter-table">
        <thead>
          <tr>
            <th>보고자</th>
            <th>단위</th>
            <th>담당 동</th>
            <th>당원투표</th>
            <th>일반(안심번호)</th>
            <th>합계</th>
            <th>보고 횟수</th>
            <th>마지막 보고</th>
          </tr>
        </thead>
        <tbody id="fieldworker-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/address.js"></script>
<script>
  let camp            = null
  let dongsByUnit     = null
  let allDongs        = []
  let charts          = {}
  let realtimeCh      = null
  let closingsCh      = null
  let closingsMap     = {}
  let reporterCache     = []
  let reporterSort      = 'desc'
  let fieldWorkerCache  = []
  let fieldWorkerSort   = 'desc'

  // ── 초기화 ──────────────────────────────────────────
  async function init() {
    const slug = getParam('slug')
    if (!slug) return showError('캠프 주소가 올바르지 않습니다.')

    try {
      const { data, error } = await db.from('camps').select('*').eq('slug', slug).single()
      if (error || !data) return showError('캠프를 찾을 수 없습니다.')

      camp = data
      document.getElementById('limit-sel').value = camp.reporter_limit || 0
      document.body.classList.add(`party-${camp.party}`)
      document.title = `${camp.district} ${camp.party_name} 대시보드`
      document.getElementById('header-district').textContent =
        `${camp.sido} ${camp.district} ${camp.party_name}`
      document.getElementById('header-party').textContent =
        `본부 실시간 대시보드`

      dongsByUnit = await getDongsByUnit(camp.sigungu)
      allDongs    = await loadDongs(camp.sigungu)

      buildUnitCards()
      await refreshDashboard()
      if (camp.election_type === '본선') {
        await loadClosings()
        subscribeClosings()
      }
      subscribeRealtime()

      document.getElementById('loading').style.display = 'none'
      document.getElementById('main').style.display    = 'block'

    } catch (e) {
      showError('오류: ' + e.message)
    }
  }

  // ── 단위 카드 구조 생성 ──────────────────────────────
  function buildUnitCards() {
    const grid = document.getElementById('unit-grid')
    grid.innerHTML = ''

    if (dongsByUnit) {
      const units = Object.keys(dongsByUnit)
      if (units.length === 2) grid.classList.add('cols-2')
      else if (units.length === 1) grid.classList.add('cols-1')
      units.forEach(unit => grid.appendChild(makeUnitCard(unit, dongsByUnit[unit])))
    } else {
      grid.classList.add('cols-1')
      grid.appendChild(makeUnitCard(null, allDongs))
    }
  }

  function makeUnitCard(unit, dongs) {
    const key   = unit || 'all'
    const label = unit ? `${camp.sigungu}${unit}` : camp.sigungu
    const div   = document.createElement('div')
    div.className = 'unit-card'
    div.innerHTML = `
      <div class="unit-card-header">
        <div class="unit-name">${label}</div>
        <div class="unit-meta">
          <div class="unit-total" id="unit-total-${key}">- 표</div>
          <div class="unit-sub"  id="unit-sub-${key}">${dongs.length}개 동</div>
        </div>
      </div>
      <div class="unit-chart-wrap">
        <canvas id="chart-${key}" height="130"></canvas>
      </div>
      <table class="dong-table">
        <thead>
          <tr>
            <th>동명</th>
            <th style="color:#fbbf24;">당원</th>
            <th style="color:#34d399;">안심번호</th>
            <th>합계</th>
            <th>보고자</th>
            <th>시각</th>
          </tr>
        </thead>
        <tbody id="tbody-${key}"></tbody>
      </table>
    `
    return div
  }

  // ── 대시보드 갱신 ────────────────────────────────────
  async function refreshDashboard() {
    const { data } = await db
      .from('submissions')
      .select('dong, reporter_name, reporter_phone, vote_count, vote_type, submitted_at')
      .eq('camp_id', camp.id)
      .order('submitted_at', { ascending: false })

    if (!data) return

    // 동별 전체 제출값 누적 합산 (양수+음수 모두 포함)
    const latest = {}
    data.forEach(row => {
      if (!latest[row.dong]) {
        latest[row.dong] = { ...row, vote_count: 0, dang_count: 0, anshim_count: 0 }
      }
      latest[row.dong].vote_count += row.vote_count
      if (row.vote_type === '안심번호') latest[row.dong].anshim_count += row.vote_count
      else                              latest[row.dong].dang_count   += row.vote_count
      // 가장 최근 제출자 이름·시간 갱신
      if (row.submitted_at > (latest[row.dong]._latestTime || '')) {
        latest[row.dong].submitted_at  = row.submitted_at
        latest[row.dong].reporter_name = row.reporter_name
        latest[row.dong]._latestTime   = row.submitted_at
      }
    })

    renderSummary(latest)

    if (dongsByUnit) {
      Object.entries(dongsByUnit).forEach(([unit, dongs]) => {
        renderUnitChart(unit, dongs, latest)
        renderUnitTable(unit, dongs, latest)
        renderUnitHeader(unit, dongs, latest)
      })
    } else {
      renderUnitChart('all', allDongs, latest)
      renderUnitTable('all', allDongs, latest)
      renderUnitHeader('all', allDongs, latest)
    }

    document.getElementById('last-update').textContent =
      '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR')
  }

  // ── 전체 요약 ────────────────────────────────────────
  function renderSummary(latest) {
    const rows     = Object.values(latest)
    const total    = rows.reduce((s, r) => s + r.vote_count, 0)
    const reported = rows.length
    const unreport = Math.max(0, allDongs.length - reported)
    const rate     = camp.target_votes > 0
      ? Math.round(total / camp.target_votes * 100) + '%' : '-'

    document.getElementById('sum-total').textContent    = formatNumber(total)
    document.getElementById('sum-rate').textContent     = rate
    document.getElementById('sum-reported').textContent = `${reported} / ${allDongs.length} 동`
    document.getElementById('sum-unreported').textContent = unreport + ' 동'
  }

  // ── 단위 카드 헤더 소계 ──────────────────────────────
  function renderUnitHeader(unit, dongs, latest) {
    const key      = unit || 'all'
    const total    = dongs.reduce((s, d) => s + (latest[d]?.vote_count || 0), 0)
    const reported = dongs.filter(d => latest[d]).length
    document.getElementById(`unit-total-${key}`).textContent = formatNumber(total) + ' 표'
    document.getElementById(`unit-sub-${key}`).textContent   =
      `${reported} / ${dongs.length}개 동 보고`
  }

  // ── 단위 차트 ────────────────────────────────────────
  function renderUnitChart(unit, dongs, latest) {
    const key    = unit || 'all'
    const votes  = dongs.map(d => latest[d]?.vote_count || 0)
    const perDongTarget = camp.target_votes > 0
      ? camp.target_votes / (allDongs.length || 1) : 0

    const colors = votes.map(v =>
      v === 0                       ? '#ef4444' :
      perDongTarget && v >= perDongTarget * 0.8 ? '#10b981' :
                                      '#3b82f6'
    )

    const ctx = document.getElementById(`chart-${key}`).getContext('2d')
    if (charts[key]) charts[key].destroy()

    charts[key] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dongs,
        datasets: [{ data: votes, backgroundColor: colors, borderRadius: 4 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { color: '#94a3b8', font: { size: 10 } },
            grid:  { color: '#334155' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#94a3b8', font: { size: 10 } },
            grid:  { color: '#334155' }
          }
        }
      }
    })
  }

  // ── 단위 테이블 ──────────────────────────────────────
  function renderUnitTable(unit, dongs, latest) {
    const key   = unit || 'all'
    const tbody = document.getElementById(`tbody-${key}`)
    tbody.innerHTML = ''

    // 보고된 동을 투표수 내림차순, 미보고는 하단
    const reported   = dongs.filter(d =>  latest[d]).sort((a, b) =>
      latest[b].vote_count - latest[a].vote_count)
    const unreported = dongs.filter(d => !latest[d])

    ;[...reported, ...unreported].forEach(dong => {
      const r        = latest[dong]
      const isClosed = closingsMap[dong] || false
      const tr       = document.createElement('tr')
      if (!r) tr.className = 'unreported'
      tr.innerHTML = `
        <td class="dong-name">${dong}${isClosed ? ' <span style="color:#4ade80;font-size:11px;">✅마감</span>' : ''}</td>
        <td style="color:#fbbf24; font-weight:600;">${r ? formatNumber(r.dang_count) : '-'}</td>
        <td style="color:#34d399; font-weight:600;">${r ? formatNumber(r.anshim_count) : '-'}</td>
        <td class="votes">${r ? formatNumber(r.vote_count) + '표' : '미보고'}</td>
        <td>${r ? r.reporter_name : '-'}</td>
        <td class="time">${r ? formatTime(r.submitted_at) : '-'}</td>
      `
      tbody.appendChild(tr)
    })
  }

  // ── 전화 모달 ────────────────────────────────────────
  function openCallModal(name, phone) {
    document.getElementById('modal-name').textContent  = name
    document.getElementById('modal-phone').textContent = phone
    document.getElementById('call-modal').classList.add('open')
  }
  function closeCallModal() {
    document.getElementById('call-modal').classList.remove('open')
  }

  // ── 탭 전환 ─────────────────────────────────────────
  function switchTab(tab) {
    const names = ['realtime', 'reporter', 'fieldworker']
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', names[i] === tab)
    })
    document.querySelectorAll('.tab-pane').forEach(pane => {
      pane.classList.toggle('active', pane.id === `pane-${tab}`)
    })
    if (tab === 'reporter')    renderReporterStats()
    if (tab === 'fieldworker') renderFieldWorkerStats()
  }

  // ── 담당자별 통계 ────────────────────────────────────
  async function renderReporterStats() {
    const { data } = await db
      .from('submissions')
      .select('reporter_name, reporter_phone, dong, vote_count, vote_type, submitted_at')
      .eq('camp_id', camp.id)
      .order('submitted_at', { ascending: false })

    if (!data || data.length === 0) {
      document.getElementById('reporter-body').innerHTML =
        '<tr><td colspan="9" style="text-align:center;color:#64748b;padding:32px;">제출 데이터가 없습니다.</td></tr>'
      return
    }

    // 담당자별 누적 합산
    const reporters = {}
    data.forEach(row => {
      if (!reporters[row.reporter_phone]) {
        reporters[row.reporter_phone] = {
          name: row.reporter_name, phone: row.reporter_phone,
          lastTime: row.submitted_at, totalVotes: 0, dangVotes: 0, anshimVotes: 0,
          allDongs: new Set(), count: 0
        }
      }
      const r = reporters[row.reporter_phone]
      r.allDongs.add(row.dong)
      r.count++
      r.totalVotes += row.vote_count
      if (row.vote_type === '안심번호') r.anshimVotes += row.vote_count
      else                              r.dangVotes   += row.vote_count
      if (row.submitted_at > r.lastTime) r.lastTime = row.submitted_at
    })

    // 단위 정보 비동기 추출
    for (const r of Object.values(reporters)) {
      r.dongs = [...r.allDongs]
      r.units      = new Set()
      for (const dong of r.dongs) {
        const u = await getUnitByDong(camp.sigungu, dong)
        if (u) r.units.add(u)
      }
    }

    reporterCache = Object.values(reporters)
    applyReporterSort()
  }

  async function setReporterLimit(val) {
    const limit = parseInt(val, 10)
    const { error } = await db.from('camps').update({ reporter_limit: limit }).eq('id', camp.id)
    if (error) { showToast('저장 실패: ' + error.message, 'error'); return }
    camp.reporter_limit = limit
    showToast(limit === 0 ? '현장 순위: 전체 표시로 설정됨' : `현장 순위: 상위 ${limit}명만 표시로 설정됨`)
  }

  function setReporterSort(order) {
    reporterSort = order
    document.getElementById('sort-desc').classList.toggle('active', order === 'desc')
    document.getElementById('sort-asc').classList.toggle('active', order === 'asc')
    applyReporterSort()
  }

  function applyReporterSort() {
    const sorted = [...reporterCache].sort((a, b) =>
      reporterSort === 'desc'
        ? b.totalVotes - a.totalVotes
        : a.totalVotes - b.totalVotes
    )
    renderReporterTable(sorted)
  }

  function renderReporterTable(sorted) {
    const maxVotes = Math.max(...sorted.map(r => r.totalVotes), 1)
    const tbody    = document.getElementById('reporter-body')
    tbody.innerHTML = ''

    sorted.forEach(r => {
      const pct      = Math.max(0, Math.round(r.totalVotes / maxVotes * 100))
      const barColor = r.totalVotes < 0  ? '#ef4444' :
                       pct >= 80         ? '#10b981' : '#3b82f6'

      const unitBadges = [...r.units].map(u =>
        `<span class="unit-badge">${u}</span>`).join('')
      const dongTags = r.dongs.map(d =>
        `<span class="dong-tag">${d}</span>`).join('')

      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td class="r-name">${r.name}</td>
        <td>${unitBadges || '<span style="color:#475569">-</span>'}</td>
        <td><div class="dong-tags">${dongTags}</div></td>
        <td style="color:#fbbf24; font-weight:700;">${formatNumber(r.dangVotes)}</td>
        <td style="color:#34d399; font-weight:700;">${formatNumber(r.anshimVotes)}</td>
        <td>
          <div style="display:flex; align-items:center; gap:8px; min-width:140px;">
            <div style="flex:1; background:#334155; border-radius:4px; height:10px; overflow:hidden;">
              <div style="width:${pct}%; height:100%; background:${barColor}; border-radius:4px; transition:width 0.4s;"></div>
            </div>
            <span class="r-votes" style="white-space:nowrap;">${formatNumber(r.totalVotes)}표</span>
          </div>
        </td>
        <td class="r-cnt">${r.count}회</td>
        <td class="r-time">${formatTime(r.lastTime)}</td>
        <td><button class="call-btn" onclick="openCallModal('${r.name}','${r.phone}')">📞 전화</button></td>
      `
      tbody.appendChild(tr)
    })
  }

  // ── 개표마감 로드 ────────────────────────────────────
  async function loadClosings() {
    const { data } = await db
      .from('closings')
      .select('dong, cancelled')
      .eq('camp_id', camp.id)
      .order('closed_at', { ascending: false })

    // 동별 최신 상태: cancelled=false면 마감
    const seen = {}
    closingsMap = {}
    ;(data || []).forEach(row => {
      if (seen[row.dong]) return
      seen[row.dong] = true
      if (!row.cancelled) closingsMap[row.dong] = true
    })

    renderClosingOverlay()
  }

  function renderClosingOverlay() {
    const total  = allDongs.length
    const closed = allDongs.filter(d => closingsMap[d]).length
    const allDone = total > 0 && closed === total

    document.getElementById('all-closed-banner').style.display = allDone ? 'block' : 'none'

    // 동 테이블 마감 표시 갱신 (이미 렌더된 tbody에서 직접 처리)
    // refreshDashboard 호출로 재렌더
    if (Object.keys(closingsMap).length > 0) refreshDashboard()
  }

  function subscribeClosings() {
    closingsCh = db
      .channel(`closings-${camp.id}`)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'closings',
        filter: `camp_id=eq.${camp.id}`
      }, async () => {
        await loadClosings()
      })
      .subscribe()
  }

  // ── Realtime 구독 ────────────────────────────────────
  function subscribeRealtime() {
    realtimeCh = db
      .channel(`camp-${camp.id}`)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'submissions',
        filter: `camp_id=eq.${camp.id}`
      }, async payload => {
        await refreshDashboard()
        showToast(`📣 ${payload.new.dong}  ${formatNumber(payload.new.vote_count)}표 보고`)
      })
      .subscribe()
  }

  window.addEventListener('beforeunload', () => {
    if (realtimeCh)  db.removeChannel(realtimeCh)
    if (closingsCh)  db.removeChannel(closingsCh)
  })

  // ── 엑셀 내보내기 ───────────────────────────────────
  async function exportExcel() {
    const btn = document.getElementById('btn-export')
    btn.disabled = true
    btn.textContent = '준비 중...'

    try {
      const { data } = await db
        .from('submissions')
        .select('reporter_name, reporter_phone, dong, vote_count, vote_type, field_worker_name, submitted_at')
        .eq('camp_id', camp.id)
        .order('submitted_at', { ascending: false })

      const wb = XLSX.utils.book_new()
      XLSX.utils.book_append_sheet(wb, buildDongSheet(data),              '동별 현황')
      XLSX.utils.book_append_sheet(wb, await buildReporterSheet(data),    '담당자별 통계')
      XLSX.utils.book_append_sheet(wb, await buildFieldWorkerSheet(data), '투표현황보고자')

      const now     = new Date()
      const dateStr = now.getFullYear().toString()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0') + '_'
        + String(now.getHours()).padStart(2, '0')
        + String(now.getMinutes()).padStart(2, '0')
      XLSX.writeFile(wb, `${camp.district}_${camp.party_name}_${dateStr}.xlsx`)
      showToast('엑셀 파일이 다운로드됐습니다.')

    } catch (e) {
      showToast('내보내기 실패: ' + e.message, 'error')
    } finally {
      btn.disabled = false
      btn.textContent = '📥 엑셀'
    }
  }

  function buildDongSheet(data) {
    // 동별 누적합
    const latest = {}
    data.forEach(row => {
      if (!latest[row.dong]) latest[row.dong] = { ...row, vote_count: 0 }
      latest[row.dong].vote_count += row.vote_count
      if (row.submitted_at > (latest[row.dong]._t || '')) {
        latest[row.dong].submitted_at  = row.submitted_at
        latest[row.dong].reporter_name = row.reporter_name
        latest[row.dong]._t            = row.submitted_at
      }
    })

    const rows = [['단위', '동명', '당원투표', '일반(안심번호)', '합계', '보고자', '보고시각']]
    const units = dongsByUnit ? Object.entries(dongsByUnit) : [[null, allDongs]]
    units.forEach(([unit, dongs]) => {
      dongs.forEach(dong => {
        const r = latest[dong]
        rows.push([unit || '', dong,
          r ? r.dang_count : 0, r ? r.anshim_count : 0, r ? r.vote_count : 0,
          r ? r.reporter_name : '', r ? formatTime(r.submitted_at) : '미보고'])
      })
    })

    const ws = XLSX.utils.aoa_to_sheet(rows)
    ws['!cols'] = [8, 16, 12, 14, 10, 14, 12].map(wch => ({ wch }))
    return ws
  }

  async function buildReporterSheet(data) {
    const reporters = {}
    data.forEach(row => {
      if (!reporters[row.reporter_phone]) {
        reporters[row.reporter_phone] = {
          name: row.reporter_name, phone: row.reporter_phone,
          lastTime: row.submitted_at, totalVotes: 0, dangVotes: 0, anshimVotes: 0,
          allDongs: new Set(), count: 0
        }
      }
      const r = reporters[row.reporter_phone]
      r.allDongs.add(row.dong)
      r.count++
      r.totalVotes += row.vote_count
      if (row.vote_type === '안심번호') r.anshimVotes += row.vote_count
      else                              r.dangVotes   += row.vote_count
      if (row.submitted_at > r.lastTime) r.lastTime = row.submitted_at
    })

    for (const r of Object.values(reporters)) {
      r.dongs = [...r.allDongs]
      r.units = new Set()
      for (const dong of r.dongs) {
        const u = await getUnitByDong(camp.sigungu, dong)
        if (u) r.units.add(u)
      }
    }

    const rows = [['이름', '전화번호', '단위', '담당 동', '당원투표', '일반(안심번호)', '합계', '제출 횟수', '마지막 보고']]
    Object.values(reporters)
      .sort((a, b) => b.totalVotes - a.totalVotes)
      .forEach(r => rows.push([
        r.name, r.phone, [...r.units].join(', '), r.dongs.join(', '),
        r.dangVotes, r.anshimVotes, r.totalVotes, r.count, formatTime(r.lastTime)
      ]))

    const ws = XLSX.utils.aoa_to_sheet(rows)
    ws['!cols'] = [12, 16, 8, 32, 12, 14, 10, 10, 12].map(wch => ({ wch }))
    return ws
  }

  async function buildFieldWorkerSheet(data) {
    const workers = {}
    data.forEach(row => {

      if (!workers[key]) {

  function showError(msg) {
    document.getElementById('loading').style.display      = 'none'
    document.getElementById('error-screen').style.display = 'block'
    document.getElementById('error-msg').textContent       = msg
  }

  document.addEventListener('DOMContentLoaded', init)
